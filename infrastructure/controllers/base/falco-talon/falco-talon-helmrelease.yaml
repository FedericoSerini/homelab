apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco-talon
  namespace: falco
spec:
  interval: 1h
  chart:
    spec:
      chart: falco-talon
      version: "0.4.0"
      sourceRef:
        kind: HelmRepository
        name: falco
        namespace: falco
  values:
    rbac:
      create: true
    serviceMonitor:
      enabled: true
    config:
      rulesOverride: |
        - rule: Kill package manager in bookstack
          match:
            rules:
              - Block Package Managers Execution
          actions:
            - action: Terminate Pod

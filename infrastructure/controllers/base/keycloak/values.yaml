database:
  vendor: postgres
  existingSecret: keycloak-secret
  existingSecretKey: keycloak-db-password

extraEnv: |
  - name: KC_DB_URL_HOST
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: keycloak-db-host
  - name: KC_DB_URL_PORT
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: keycloak-db-port
  - name: KC_DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: keycloak-db-user
  - name: KC_DB_URL_DATABASE
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: keycloak-db-name
  - name: KEYCLOAK_ADMIN
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: KEYCLOAK_ADMIN_USER
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: KEYCLOAK_ADMIN_PASSWORD

proxy:
  enabled: true
  mode: forwarded

http:
  relativePath: "/"
